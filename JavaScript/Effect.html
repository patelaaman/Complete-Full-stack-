<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>What can JavaScript DO ? </h1>
    <p> java Script  Change HTML Attributes Values </p>
    <p>in this case JavaScript changes the  value of the src ( source ) attributes of an image </p>

    <button onclick="document.getElementById('myimage').src = 'bulb.png'" style="width: 100px;">Turn On the light</button>

    <img id="myimage" src="bulbon.jpg" style="width:120px; height: 130px;">

    <button onclick="document.getElementById('myimage').src='bulbon.jpg'" style="width: 100px;">Turn off The Light </button>

</body>
</html>
